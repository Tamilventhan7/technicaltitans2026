version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: transitops_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - transitops_network

  backend:
    build: .
    container_name: transitops_api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/transitops
      - JWT_SECRET=super_secret_jwt_access_token_key_2026
      - JWT_REFRESH_SECRET=super_secret_jwt_refresh_token_key_2026
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - CLOUDINARY_CLOUD_NAME=your_cloud_name
      - CLOUDINARY_API_KEY=your_api_key
      - CLOUDINARY_API_SECRET=your_api_secret
      - EMAIL_HOST=smtp.mailtrap.io
      - EMAIL_PORT=2525
      - EMAIL_USER=your_email_user
      - EMAIL_PASS=your_email_pass
      - EMAIL_FROM=alerts@transitops.com
      - GEMINI_API_KEY=your_gemini_api_key
    depends_on:
      - mongodb
    networks:
      - transitops_network

volumes:
  mongo_data:

networks:
  transitops_network:
    driver: bridge
